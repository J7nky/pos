name: store-app parity gate

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/store-app/**'
      - '.github/workflows/store-app-parity.yml'
  pull_request:
    paths:
      - 'apps/store-app/**'
      - '.github/workflows/store-app-parity.yml'

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @pos-platform/shared run build

      - name: Parity gate
        run: pnpm --filter ./apps/store-app run parity:gate
