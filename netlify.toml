# Root-level netlify.toml (monorepo)
#
# Netlify UI: leave "Base directory" EMPTY (build from repository root).
# If the UI sets base to apps/store-app (monorepo package picker), the computed
# publish path becomes apps/store-app/apps/admin-app/dist and deploys break.
# Same for admin-app sites: base empty, or use apps/admin-app/netlify.toml only.
#
# Per-app toml: apps/store-app/netlify.toml, apps/admin-app/netlify.toml


[build]
  # Always run pnpm from the git root so Netlify base/subdir does not matter.
  command = "cd \"$(git rev-parse --show-toplevel)\" && SITE_NAME=\"${NETLIFY_SITE_NAME:-${NETLIFY_SITE_ID:-unknown}}\"; URL=\"${URL:-${DEPLOY_PRIME_URL:-unknown}}\"; if echo \"$SITE_NAME $URL\" | grep -qiE '(admin|super)'; then echo '🔧 Building admin-app for site: $SITE_NAME ($URL)' && pnpm install --frozen-lockfile && pnpm --filter @pos-platform/shared build && pnpm --filter admin-app build && echo 'admin-app' > .netlify-build-target; else echo '🔧 Building store-app for site: $SITE_NAME ($URL)' && pnpm install --frozen-lockfile && pnpm --filter @pos-platform/shared build && pnpm --filter ./apps/store-app run build:netlify && mkdir -p apps/admin-app && cp -r apps/store-app/dist apps/admin-app/dist && echo 'store-app' > .netlify-build-target; fi"
  # Publish directory - both apps will have their dist copied to this location
  # This ensures the publish directory always exists regardless of which app was built
  publish = "apps/admin-app/dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10.20.0"

# Redirect rules for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Specific redirect for public customer statement routes
[[redirects]]
  from = "/public/customer-statement/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache service worker
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

