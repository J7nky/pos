# Root-level netlify.toml
# This file configures builds to run from apps/store-app by default
# 
# IMPORTANT: This is a monorepo. Each app has its own netlify.toml:
# - apps/store-app/netlify.toml
# - apps/admin-app/netlify.toml
#
# For best results, configure each Netlify site with a base directory:
# - Store App: Base directory = "apps/store-app" (uses this root config or app-specific config)
# - Admin App: Base directory = "apps/admin-app" (uses app-specific config)
#
# If base directory is not set in Netlify dashboard, this root config will build store-app
# WORKAROUND: Check site name to determine which app to build

[build]
  # Build command - detect which app to build based on site name or URL
  # Check NETLIFY_SITE_NAME, URL, or site ID to determine which site is being built
  # If site name/URL contains "admin" or "super", build admin-app
  # Otherwise, build store-app (default)
  # After building, ensure the publish directory exists by copying dist to expected location
  command = "SITE_NAME=\"${NETLIFY_SITE_NAME:-${NETLIFY_SITE_ID:-unknown}}\"; URL=\"${URL:-${DEPLOY_PRIME_URL:-unknown}}\"; if echo \"$SITE_NAME $URL\" | grep -qiE '(admin|super)'; then echo '🔧 Building admin-app for site: $SITE_NAME ($URL)' && pnpm install --frozen-lockfile && pnpm --filter @pos-platform/shared build && pnpm --filter admin-app build && echo 'admin-app' > .netlify-build-target; else echo '🔧 Building store-app for site: $SITE_NAME ($URL)' && pnpm install --frozen-lockfile && pnpm --filter ./apps/store-app run build:netlify && mkdir -p apps/admin-app && cp -r apps/store-app/dist apps/admin-app/dist && echo 'store-app' > .netlify-build-target; fi"
  # Publish directory - both apps will have their dist copied to this location
  # This ensures the publish directory always exists regardless of which app was built
  publish = "apps/admin-app/dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10.20.0"

# Redirect rules for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Specific redirect for public customer statement routes
[[redirects]]
  from = "/public/customer-statement/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache service worker
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

