[build]
  # Directory to change to before starting a build
  # Note: Netlify should set base directory to apps/store-app in dashboard
  # If base directory is not set, this will fail - ensure it's set in Netlify dashboard
  base = "."
  
  # Directory that contains the deploy-ready HTML files and assets
  publish = "dist"
  
  # Build command - runs from apps/store-app directory (when base directory is set correctly)
  # If you see "Missing script: build:netlify" error, check that base directory is set to apps/store-app in Netlify dashboard
  command = "npm install --include=dev && npm run build:netlify"

[build.environment]
  # Node.js version (use 20 for better Vite compatibility)
  NODE_VERSION = "20"
  # Ensure dev dependencies are installed
  NPM_FLAGS = "--include=dev"

# Redirect rules for SPA routing
# IMPORTANT: Exclude /updates/* from SPA redirects so update files are accessible
# The /updates/* rule must come BEFORE the catch-all /* rule

# Exclude updates folder from SPA redirect (must come before catch-all)
[[redirects]]
  from = "/updates/*"
  to = "/updates/:splat"
  status = 200
  force = true

# Catch-all SPA redirect (must come after specific routes)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Specific redirect for public customer statement routes
[[redirects]]
  from = "/public/customer-statement/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache service worker
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Headers for update files (allow CORS and proper content types)
[[headers]]
  for = "/updates/*"
  [headers.values]
    Content-Type = "application/octet-stream"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Cache-Control = "public, max-age=3600"
