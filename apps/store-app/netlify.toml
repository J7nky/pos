[build]
  base = "."
  publish = "dist"
  # Monorepo: run pnpm from git root so this works when Netlify cwd is apps/store-app.
  command = "cd \"$(git rev-parse --show-toplevel)\" && pnpm install --frozen-lockfile && pnpm --filter ./apps/store-app run build:netlify"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10.20.0"

# Redirect rules for SPA routing
# IMPORTANT: Exclude /updates/* from SPA redirects so update files are accessible
# The /updates/* rule must come BEFORE the catch-all /* rule

# Exclude updates folder from SPA redirect (must come before catch-all)
# This allows update files to be served directly without redirecting to index.html
[[redirects]]
  from = "/updates/*"
  to = "/updates/:splat"
  status = 200
  force = true
  # Don't redirect if file exists
  conditions = {}

# Catch-all SPA redirect (must come after specific routes)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Specific redirect for public customer statement routes
[[redirects]]
  from = "/public/customer-statement/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache service worker
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Headers for update files (allow CORS and proper content types)
# Note: Content-Type is set automatically by Netlify based on file extension
[[headers]]
  for = "/updates/*.yml"
  [headers.values]
    Content-Type = "text/yaml"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/updates/*.nupkg"
  [headers.values]
    Content-Type = "application/octet-stream"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/updates/*.exe"
  [headers.values]
    Content-Type = "application/octet-stream"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Cache-Control = "public, max-age=3600"
